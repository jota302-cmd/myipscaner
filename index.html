<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyIPScaner | ¿Qué sabe Internet de mí?</title>
    <meta name="description"
        content="Auditoría de privacidad instantánea. Descubre tu IP y rastro digital con procesamiento 100% local.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8167884438770174"
        crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-electric: #06B6D4;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .text-cyan-electric {
            color: var(--cyan-electric);
        }

        .bg-cyan-electric {
            background-color: var(--cyan-electric);
        }

        /* Navbar */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-container {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: white;
            transition: opacity 0.3s;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .logo-box {
            width: 2rem;
            height: 2rem;
            border-radius: 4px;
            background: var(--cyan-electric);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
            font-size: 1.25rem;
        }

        .logo-text {
            font-weight: bold;
            font-size: 1.25rem;
            letter-spacing: -0.05em;
        }

        /* Language Toggle */
        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-label {
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.7;
        }

        .toggle-track {
            width: 2.5rem;
            height: 1.25rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 0.125rem;
        }

        .toggle-dot {
            width: 1rem;
            height: 1rem;
            background: var(--cyan-electric);
            border-radius: 9999px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        /* Ad Slots */
        .ad-container {
            max-width: 80rem;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .ad-slot {
            width: 100%;
            height: 5.625rem;
            border-radius: 0.5rem;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-slot::after {
            content: "Ads / Anuncio";
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.125rem;
            color: #9ca3af;
            max-width: 42rem;
            margin: 0 auto;
        }

        /* Scan Section */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 3.75rem;
            }
        }

        @media (min-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .data-card {
            padding: 2rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .data-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .data-card:hover {
            border-color: var(--cyan-electric);
        }

        .card-icon {
            width: 3rem;
            height: 3rem;
            border-radius: 0.75rem;
            background: rgba(6, 182, 212, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--cyan-electric);
        }

        .card-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: bold;
            word-break: break-all;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            margin-top: 0.5rem;
        }

        .status-badge.loading {
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
        }

        .status-badge.error {
            background: rgba(239, 44, 44, 0.1);
            color: #ef4444;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3rem 1.5rem;
        }

        .footer-container {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .footer-container {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-link {
            font-size: 0.75rem;
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }

        .footer-link:hover {
            color: var(--cyan-electric);
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-content {
            max-width: 50rem;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2.5rem;
            border-radius: 1.5rem;
            border-top: 2px solid var(--cyan-electric);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0.5rem;
        }

        .close-btn:hover {
            color: var(--cyan-electric);
        }

        /* Support Options */
        .support-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        @media (min-width: 640px) {
            .support-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .support-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
        }

        .support-btn.bmc {
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .support-btn.paypal {
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .support-btn:hover {
            border-color: var(--cyan-electric);
            background: rgba(6, 182, 212, 0.1);
        }

        .crypto-box {
            grid-column: 1 / -1;
            padding: 1rem;
            border-radius: 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .crypto-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: #6b7280;
        }

        .copy-btn {
            background: rgba(6, 182, 212, 0.1);
            color: var(--cyan-electric);
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .copy-btn.copied {
            background: var(--cyan-electric);
            color: black;
        }

        .address-text {
            font-family: monospace;
            font-size: 0.875rem;
            color: var(--cyan-electric);
            word-break: break-all;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.6s ease forwards;
        }

        /* Utils */
        .hidden {
            display: none !important;
        }

        .loader {
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid rgba(6, 182, 212, 0.1);
            border-top-color: var(--cyan-electric);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <nav class="glass">
        <div class="nav-container">
            <a href="https://optimicrotools.com" class="logo">
                <div class="logo-box">O</div>
                <span class="logo-text">OPTIMICRO<span class="text-cyan-electric">TOOLS</span></span>
            </a>
            <div class="lang-toggle" onclick="toggleLanguage()">
                <span id="lang-label-en" class="lang-label">EN</span>
                <div class="toggle-track">
                    <div id="toggle-circle" class="toggle-dot"></div>
                </div>
                <span id="lang-label-es" class="lang-label">ES</span>
            </div>
        </div>
    </nav>

    <div class="ad-container">
        <div class="ad-slot"></div>
    </div>

    <main>
        <header>
            <h1 id="hero-title" class="animate-fade">¿Qué sabe <span class="text-cyan-electric">Internet de mí?</span>
            </h1>
            <p id="hero-subtitle" class="subtitle animate-fade" style="animation-delay: 0.1s">
                Auditoría instantánea de tu conexión. 100% privado, procesamiento local.
            </p>
        </header>

        <div class="card-grid">
            <!-- IP Card -->
            <div class="glass data-card show" style="animation-delay: 0.2s">
                <div class="card-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </div>
                <div id="lbl-ip" class="card-label">Tu Dirección IP</div>
                <div id="val-ip" class="card-value">...</div>
                <div id="status-ip" class="status-badge loading">
                    <span id="txt-status">Analizando...</span>
                </div>
            </div>

            <!-- Location Card -->
            <div class="glass data-card show" style="animation-delay: 0.3s">
                <div class="card-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                </div>
                <div id="lbl-location" class="card-label">Tu Ubicación</div>
                <div id="val-location" class="card-value">...</div>
            </div>

            <!-- ISP Card -->
            <div class="glass data-card show" style="animation-delay: 0.4s">
                <div class="card-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path
                            d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.343 9.414c5.857-5.858 15.355-5.858 21.213 0" />
                    </svg>
                </div>
                <div id="lbl-isp" class="card-label">Proveedor (ISP)</div>
                <div id="val-isp" class="card-value">...</div>
            </div>
        </div>

        <div id="error-box" class="glass data-card hidden mt-8 bg-red-500/10 border-red-500/50"
            style="opacity: 1; transform: none;">
            <p id="error-msg" class="text-red-500 font-semibold"></p>
            <button onclick="fetchData()"
                class="mt-4 px-4 py-2 bg-red-500/20 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all text-sm font-bold">Reintentar</button>
        </div>
    </main>

    <div class="ad-container">
        <div class="ad-slot"></div>
    </div>

    <footer>
        <div class="footer-container">
            <div>
                <p class="text-sm font-bold">© 2026 OPTIMICRO<span class="text-cyan-electric">TOOLS</span></p>
                <p id="footer-tag" class="text-xs text-gray-500 mt-1">Engineered for Performance & Privacy</p>
            </div>
            <div class="footer-links">
                <a onclick="openModal('support')" class="footer-link">Support Project</a>
                <a onclick="openModal('privacy')" class="footer-link" id="link-privacy">Privacy</a>
                <a onclick="openModal('terms')" class="footer-link" id="link-terms">Terms</a>
            </div>
        </div>
    </footer>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay" onclick="handleOutsideClick(event)">
        <div class="modal-content glass">
            <button class="close-btn" onclick="closeModal()">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h2 id="modal-title" class="text-2xl font-bold text-cyan-electric mb-4"></h2>
            <div id="modal-body" class="text-gray-300 leading-relaxed"></div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                heroTitle: "What does <span class='text-cyan-electric'>Internet know about me?</span>",
                heroSubtitle: "Instant audit of your connection. 100% private, local processing.",
                lblIp: "Your IP Address",
                lblLocation: "Your Location",
                lblIsp: "Internet Provider (ISP)",
                statusScanning: "Analyzing...",
                statusSafe: "Connection Secure",
                errorFetch: "We couldn't get your digital footprint. Try again.",
                footerTag: "Engineered for Performance & Privacy",
                supportTitle: "Support the Project",
                supportBody: "Your support keeps this project private, fast, and free. Choose your preferred way to help.",
                privacyTitle: "Privacy Policy",
                privacyBody: "Data processing is 100% client-side. We do not store your IP or location data. We use Google AdSense for monetization.",
                termsTitle: "Terms of Service",
                termsBody: "This tool is provided 'as is'. Accuracy depends on third-party APIs. We are not responsible for how you use this data.",
                retry: "Retry",
                copy: "Copy",
                copied: "Copied!"
            },
            es: {
                heroTitle: "¿Qué sabe <span class='text-cyan-electric'>Internet de mí?</span>",
                heroSubtitle: "Auditoría instantánea de tu conexión. 100% privado, procesamiento local.",
                lblIp: "Tu Dirección IP",
                lblLocation: "Tu Ubicación",
                lblIsp: "Proveedor de Internet (ISP)",
                statusScanning: "Analizando...",
                statusSafe: "Conexión Segura",
                errorFetch: "No pudimos obtener tu rastro digital. Inténtalo de nuevo.",
                footerTag: "Diseñado para Rendimiento y Privacidad",
                supportTitle: "Apoya el Proyecto",
                supportBody: "Tu apoyo mantiene este proyecto privado, rápido y libre. Elige tu forma preferida de ayudar.",
                privacyTitle: "Política de Privacidad",
                privacyBody: "El procesamiento de datos es 100% en el cliente. No guardamos tu IP ni ubicación. Usamos Google AdSense para monetización.",
                termsTitle: "Términos de Servicio",
                termsBody: "Esta herramienta se entrega 'tal cual'. La precisión depende de APIs de terceros. No somos responsables del uso de estos datos.",
                retry: "Reintentar",
                copy: "Copiar",
                copied: "¡Copiado!"
            }
        };

        let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('es') ? 'es' : 'en');
        const API_TIMEOUT = 5000;

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('hero-title').innerHTML = t.heroTitle;
            document.getElementById('hero-subtitle').textContent = t.heroSubtitle;
            document.getElementById('lbl-ip').textContent = t.lblIp;
            document.getElementById('lbl-location').textContent = t.lblLocation;
            document.getElementById('lbl-isp').textContent = t.lblIsp;
            document.getElementById('footer-tag').textContent = t.footerTag;
            document.getElementById('link-privacy').textContent = t.privacyTitle.split(' ')[0];
            document.getElementById('link-terms').textContent = t.termsTitle.split(' ')[0];

            const circle = document.getElementById('toggle-circle');
            circle.style.transform = currentLang === 'es' ? 'translateX(1.25rem)' : 'translateX(0)';

            // Refresh scan status text if still loading
            const statusEl = document.getElementById('txt-status');
            if (statusEl.getAttribute('data-state') === 'loading') {
                statusEl.textContent = t.statusScanning;
            } else if (statusEl.getAttribute('data-state') === 'safe') {
                statusEl.textContent = t.statusSafe;
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            localStorage.setItem('lang', currentLang);
            updateUI();
        }

        async function fetchWithTimeout(url, options = {}) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), API_TIMEOUT);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        async function fetchData() {
            const valIp = document.getElementById('val-ip');
            const valLoc = document.getElementById('val-location');
            const valIsp = document.getElementById('val-isp');
            const statusIp = document.getElementById('status-ip');
            const txtStatus = document.getElementById('txt-status');
            const errorBox = document.getElementById('error-box');

            txtStatus.textContent = translations[currentLang].statusScanning;
            txtStatus.setAttribute('data-state', 'loading');
            statusIp.className = "status-badge loading";
            errorBox.classList.add('hidden');

            try {
                let data;
                try {
                    // Primary API
                    const response = await fetchWithTimeout('https://ipapi.co/json/');
                    if (!response.ok) throw new Error('Primary failed');
                    data = await response.json();
                } catch (err) {
                    console.warn("Primary API failed, trying fallback...", err);
                    // Fallback API
                    const response = await fetchWithTimeout('https://ip-api.com/json/');
                    if (!response.ok) throw new Error('Fallback failed');
                    data = await response.json();
                    // Map ip-api field names to ipapi.co ones
                    data.ip = data.query;
                    data.org = data.isp;
                }

                valIp.textContent = data.ip || 'Unknown';
                valLoc.textContent = data.city ? `${data.city}, ${data.country_name || data.country}` : 'Unknown';
                valIsp.textContent = data.org || 'Unknown';

                txtStatus.textContent = translations[currentLang].statusSafe;
                txtStatus.setAttribute('data-state', 'safe');
                statusIp.className = "status-badge";
            } catch (error) {
                console.error("All APIs failed", error);
                statusIp.className = "status-badge error";
                txtStatus.textContent = "Error";
                txtStatus.setAttribute('data-state', 'error');
                errorBox.classList.remove('hidden');
                document.getElementById('error-msg').textContent = translations[currentLang].errorFetch;
            }
        }

        function openModal(type) {
            const container = document.getElementById('modal-container');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            const t = translations[currentLang];

            if (type === 'support') {
                title.textContent = t.supportTitle;
                body.innerHTML = `
                    <p class="mb-6 opacity-80">${t.supportBody}</p>
                    <div class="support-grid">
                        <a href="https://www.buymeacoffee.com/jota302" target="_blank" class="support-btn bmc">
                            <span>☕</span> Buy Me a Coffee
                        </a>
                        <a href="https://paypal.me/jota302" target="_blank" class="support-btn paypal">
                            <span>💳</span> PayPal
                        </a>
                        <div class="crypto-box">
                            <div class="crypto-header">
                                <span>USDT (TRC20)</span>
                                <button onclick="copyToClipboard('TE95Gtd8qTWnsEcqXxDEoQoKLNg2hMvVtV', this)" class="copy-btn">${t.copy}</button>
                            </div>
                            <div class="address-text">TE95Gtd8qTWnsEcqXxDEoQoKLNg2hMvVtV</div>
                        </div>
                    </div>
                `;
            } else if (type === 'privacy') {
                title.textContent = t.privacyTitle;
                body.textContent = t.privacyBody;
            } else if (type === 'terms') {
                title.textContent = t.termsTitle;
                body.textContent = t.termsBody;
            }

            container.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-container').style.display = 'none';
            document.body.style.overflow = '';
        }

        function handleOutsideClick(e) {
            if (e.target.id === 'modal-container') closeModal();
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = translations[currentLang].copied;
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            fetchData();
        });
